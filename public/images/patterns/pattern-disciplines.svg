<svg xmlns="http://www.w3.org/2000/svg" width="240" height="240" viewBox="0 0 240 240" shape-rendering="geometricPrecision">
  <defs>
    <style>
      .pat { fill: currentColor; }
    </style>
  </defs>

  <!-- Top-left: Typography — stylized T -->
  <g transform="translate(20,20)" class="pat">
    <rect x="0" y="0" width="26" height="4" />
    <rect x="11" y="0" width="4" height="24" />
  </g>

  <!-- Top-center: Code brackets </> -->
  <g transform="translate(100,22)" class="pat">
    <!-- Left angle bracket -->
    <polygon points="0,16 -8,16 2,24 2,21 -3,16 2,11 2,8" />
    <!-- Right angle bracket -->
    <polygon points="22,16 30,16 20,8 20,11 25,16 20,21 20,24" />
    <!-- Slash -->
    <polygon points="18,4 12,30 10,30 16,4" />
  </g>

  <!-- Top-right: Motion — play triangle -->
  <g transform="translate(200,20)" class="pat">
    <polygon points="0,0 18,9 0,18" />
  </g>

  <!-- Middle-left: diamond -->
  <g transform="translate(28,110)" class="pat">
    <rect x="0" y="0" width="12" height="12" transform="rotate(45 6 6)" />
  </g>

  <!-- Middle-center: Motion — record dot with ring -->
  <g transform="translate(108,108)">
    <circle cx="12" cy="12" r="13" fill="none" stroke="currentColor" stroke-width="2" />
    <circle cx="12" cy="12" r="4" class="pat" />
  </g>

  <!-- Middle-right: Code cursor bar -->
  <g transform="translate(196,106)" class="pat">
    <rect x="0" y="0" width="3" height="20" />
    <rect x="-5" y="0" width="13" height="3" />
    <rect x="-5" y="17" width="13" height="3" />
  </g>

  <!-- Bottom-left: Typography — serif A -->
  <g transform="translate(22,196)">
    <polygon class="pat" points="2,24 12,0 22,24 19,24 12,7 5,24" />
    <rect class="pat" x="7" y="14" width="10" height="3" />
  </g>

  <!-- Bottom-center: Motion — waveform bars -->
  <g transform="translate(104,198)" class="pat">
    <rect x="0"  y="10" width="3" height="8" />
    <rect x="6"  y="6"  width="3" height="16" />
    <rect x="12" y="2"  width="3" height="24" />
    <rect x="18" y="6"  width="3" height="16" />
    <rect x="24" y="10" width="3" height="8" />
    <rect x="30" y="8"  width="3" height="12" />
  </g>

  <!-- Bottom-right: Branding — small grid mark -->
  <g transform="translate(196,196)" class="pat">
    <rect x="0"  y="0"  width="10" height="10" transform="rotate(45 5 5)" />
    <rect x="20" y="20" width="10" height="10" transform="rotate(45 25 25)" />
  </g>
</svg>
